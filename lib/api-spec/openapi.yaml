openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /rides-api
    description: Rides API path
tags:
  - name: health
    description: Health operations
  - name: rides
    description: Ride request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /requests:
    get:
      operationId: listRideRequests
      tags: [rides]
      summary: List active passenger requests
      responses:
        "200":
          description: Active requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideRequest"
    post:
      operationId: createRideRequest
      tags: [rides]
      summary: Create a passenger ride request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRideRequest"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
  /requests/{id}:
    get:
      operationId: getRideRequest
      tags: [rides]
      summary: Get one ride request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ride request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "404":
          description: Request not found
  /requests/{id}/cancel:
    post:
      operationId: cancelRideRequest
      tags: [rides]
      summary: Passenger cancels their ride request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "404":
          description: Request not found
  /requests/{id}/release:
    post:
      operationId: releaseRideRequest
      tags: [rides]
      summary: Return accepted ride to the active pool (driver or passenger)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseRideRequest"
      responses:
        "200":
          description: Released ride is active again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "403":
          description: Driver phone does not match
        "404":
          description: Request not found
        "409":
          description: Request is not accepted
  /requests/{id}/accept:
    post:
      operationId: acceptRideRequest
      tags: [rides]
      summary: Driver accepts a passenger request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptRideRequest"
      responses:
        "200":
          description: Accepted request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "404":
          description: Request not found
        "409":
          description: Request already accepted
  /drivers:
    get:
      operationId: listActiveDrivers
      tags: [rides]
      summary: List drivers who recently accepted rides or published offers
      responses:
        "200":
          description: Active drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveDriver"
  /offers:
    get:
      operationId: listDriverOffers
      tags: [rides]
      summary: List active driver offers
      responses:
        "200":
          description: Active driver offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverOffer"
    post:
      operationId: createDriverOffer
      tags: [rides]
      summary: Driver publishes a ride offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverOffer"
      responses:
        "201":
          description: Created offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverOffer"
  /offers/{id}/cancel:
    post:
      operationId: cancelDriverOffer
      tags: [rides]
      summary: Driver cancels their offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelDriverOfferRequest"
      responses:
        "200":
          description: Cancelled offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverOffer"
        "403":
          description: Driver phone does not match
        "404":
          description: Offer not found
  /stats:
    get:
      operationId: getRideStats
      tags: [rides]
      summary: Small dashboard summary
      responses:
        "200":
          description: Ride statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RideStatus:
      type: string
      enum: [active, accepted, cancelled, completed]
    CreateRideRequest:
      type: object
      properties:
        origin:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        pickupAddress:
          type: string
          minLength: 3
        passengerPhone:
          type: string
          description: >-
            Кыргызстан форматы +996 жана 9 сан. Бош калышы мүмкүн гана Telegram аркылуу
            авторизацияланган колдонуучу үчүн (сервер текшерет).
        notes:
          type: string
          maxLength: 500
        seats:
          type: integer
          minimum: 1
          maximum: 7
        departAfter:
          type: string
          format: date-time
        departBefore:
          type: string
          format: date-time
      required:
        - origin
        - destination
        - pickupAddress
        - seats
        - departAfter
        - departBefore
    ReleaseRideRequest:
      type: object
      properties:
        driverPhone:
          type: string
          description: Driver releasing their own accepted ride (must match ride driverPhone)
        passengerPhone:
          type: string
          description: Passenger declining the matched driver (must match ride passengerPhone)
    AcceptRideRequest:
      type: object
      properties:
        driverName:
          type: string
          minLength: 2
        driverPhone:
          type: string
          minLength: 5
        driverAge:
          type: integer
          minimum: 18
          maximum: 80
        driverExperience:
          type: integer
          minimum: 0
          maximum: 60
        carMake:
          type: string
          minLength: 2
        carYear:
          type: integer
          minimum: 1980
          maximum: 2030
        carPlate:
          type: string
          minLength: 3
        carColor:
          type: string
          minLength: 2
        carSeats:
          type: integer
          minimum: 1
          maximum: 8
      required:
        - driverName
        - driverPhone
        - driverAge
        - driverExperience
        - carMake
        - carYear
        - carPlate
        - carColor
        - carSeats
    RideRequest:
      type: object
      properties:
        id:
          type: string
        origin:
          type: string
        destination:
          type: string
        pickupAddress:
          type: string
        passengerPhone:
          type: string
        passengerTelegramUserId:
          type: string
          description: Telegram user id (when заявка без телефона)
        passengerTelegramUsername:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        seats:
          type: integer
        route:
          type: string
        status:
          $ref: "#/components/schemas/RideStatus"
        driverName:
          type: string
          nullable: true
        driverPhone:
          type: string
          nullable: true
        driverAge:
          type: integer
          nullable: true
        driverExperience:
          type: integer
          nullable: true
        carMake:
          type: string
          nullable: true
        carYear:
          type: integer
          nullable: true
        carPlate:
          type: string
          nullable: true
        carColor:
          type: string
          nullable: true
        carSeats:
          type: integer
          nullable: true
        departAfter:
          type: string
          format: date-time
        departBefore:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        rideProgress:
          type: string
          nullable: true
          enum: [assigned, en_route, arrived, in_trip, completed]
        completedAt:
          type: string
          format: date-time
          nullable: true
        passengerRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        ratedAt:
          type: string
          format: date-time
          nullable: true
        driverPassengerRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        driverRatedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - origin
        - destination
        - pickupAddress
        - passengerPhone
        - notes
        - seats
        - route
        - status
        - driverName
        - driverPhone
        - driverAge
        - driverExperience
        - carMake
        - carYear
        - carPlate
        - carColor
        - carSeats
        - departAfter
        - departBefore
        - createdAt
        - acceptedAt
        - cancelledAt
    ActiveDriver:
      type: object
      properties:
        kind:
          type: string
          enum: [ride, offer]
        id:
          type: string
        driverName:
          type: string
        driverPhone:
          type: string
        driverAge:
          type: integer
        driverExperience:
          type: integer
        carMake:
          type: string
        carYear:
          type: integer
        carPlate:
          type: string
        carColor:
          type: string
        carSeats:
          type: integer
        route:
          type: string
        origin:
          type: string
        destination:
          type: string
        seats:
          type: integer
          nullable: true
        departAfter:
          type: string
          format: date-time
          nullable: true
        departBefore:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        lastSeenAt:
          type: string
          format: date-time
      required:
        - kind
        - id
        - driverName
        - driverPhone
        - driverAge
        - driverExperience
        - carMake
        - carYear
        - carPlate
        - carColor
        - carSeats
        - route
        - origin
        - destination
        - seats
        - departAfter
        - departBefore
        - notes
        - lastSeenAt
    CreateDriverOffer:
      type: object
      properties:
        origin:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        seats:
          type: integer
          minimum: 1
          maximum: 8
        notes:
          type: string
          maxLength: 500
        departAfter:
          type: string
          format: date-time
        departBefore:
          type: string
          format: date-time
        driverName:
          type: string
          minLength: 2
        driverPhone:
          type: string
          minLength: 5
        driverAge:
          type: integer
          minimum: 18
          maximum: 80
        driverExperience:
          type: integer
          minimum: 0
          maximum: 60
        carMake:
          type: string
          minLength: 2
        carYear:
          type: integer
          minimum: 1980
          maximum: 2030
        carPlate:
          type: string
          minLength: 3
        carColor:
          type: string
          minLength: 2
        carSeats:
          type: integer
          minimum: 1
          maximum: 8
      required:
        - origin
        - destination
        - seats
        - departAfter
        - departBefore
        - driverName
        - driverPhone
        - driverAge
        - driverExperience
        - carMake
        - carYear
        - carPlate
        - carColor
        - carSeats
    CancelDriverOfferRequest:
      type: object
      properties:
        driverPhone:
          type: string
      required:
        - driverPhone
    DriverOffer:
      type: object
      properties:
        id:
          type: string
        origin:
          type: string
        destination:
          type: string
        route:
          type: string
        seats:
          type: integer
        notes:
          type: string
          nullable: true
        departAfter:
          type: string
          format: date-time
        departBefore:
          type: string
          format: date-time
        driverName:
          type: string
        driverPhone:
          type: string
        driverAge:
          type: integer
        driverExperience:
          type: integer
        carMake:
          type: string
        carYear:
          type: integer
        carPlate:
          type: string
        carColor:
          type: string
        carSeats:
          type: integer
        status:
          type: string
          enum: [active, cancelled]
        createdAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - origin
        - destination
        - route
        - seats
        - notes
        - departAfter
        - departBefore
        - driverName
        - driverPhone
        - driverAge
        - driverExperience
        - carMake
        - carYear
        - carPlate
        - carColor
        - carSeats
        - status
        - createdAt
        - cancelledAt
    RideStats:
      type: object
      properties:
        activeRequests:
          type: integer
        acceptedRequests:
          type: integer
        totalSeats:
          type: integer
      required:
        - activeRequests
        - acceptedRequests
        - totalSeats
